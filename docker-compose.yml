version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: pc_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7.0-alpine
    container_name: pc_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"

  inventory-service:
    build: 
      context: ./inventory-service
      dockerfile: Dockerfile.dev
    container_name: pc_inventory
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/inventory_db?authSource=admin
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_KEY=${MEILI_KEY}
    volumes:
      - ./inventory-service/src:/usr/src/app/src 
    depends_on:
      - mongodb
      - redis
      - meilisearch 

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: pc_meilisearch
    restart: always 
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILI_KEY}
      - MEILI_ENV=development 
    volumes:
      - meili_data:/meili_data

  nginx:
    image: nginx:alpine
    container_name: pc_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - inventory-service
  
  # --- HỆ THỐNG GIÁM SÁT (MONITORING) ---
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: pc_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - inventory-service

  loki:
    image: grafana/loki:3.2.0
    container_name: pc_loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.2.0
    container_name: pc_promtail
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.2
    container_name: pc_grafana
    ports:
      - "3001:3000" # Cổng 3000 bên trong đã bận, ta dùng cổng 3001 ở ngoài
    volumes:
      # Mount các file cấu hình tự động
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      # Mount các file JSON biểu đồ
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki

volumes:
  mongo_data:
  meili_data:

  
