version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: pc_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7.0-alpine
    container_name: pc_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"

  inventory-service:
    build: 
      context: ./inventory-service
      dockerfile: Dockerfile.dev
    container_name: pc_inventory
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/inventory_db?authSource=admin
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_KEY=${MEILI_KEY}
    volumes:
      - ./inventory-service/src:/usr/src/app/src 
    depends_on:
      - mongodb
      - redis
      - meilisearch 

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: pc_meilisearch
    restart: always 
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILI_KEY}
      - MEILI_ENV=development 
    volumes:
      - meili_data:/meili_data

volumes:
  mongo_data:
  meili_data: