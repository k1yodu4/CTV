# Cấu hình Rate Limit: Mỗi IP chỉ được 10 request/giây
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;

    location / {
        # Áp dụng luật Rate Limit
        limit_req zone=api_limit burst=20 nodelay;

        # Reverse Proxy: Chuyển tiếp request vào Node.js Backend
        proxy_pass http://inventory-service:3000;
        
        # Giữ nguyên các Header quan trọng (như JWT Token)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }
}