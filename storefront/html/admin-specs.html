<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý & Thêm mới Danh mục Specs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin-specs.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>⚙️ Cấu hình thuộc tính Danh mục</h2>
            <a href="admin.html" class="btn btn-outline-secondary">⬅️ Quay lại Thêm sản phẩm</a>
        </div>
        
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm p-3 sticky-top-custom">
                    <label class="form-label fw-bold">1. Chọn hoặc Thêm danh mục</label>
                    <select id="categorySelect" class="form-select mb-3" onchange="handleCategoryChange()">
                        <option value="">-- Chọn danh mục có sẵn --</option>
                        <option value="NEW" class="text-primary fw-bold">+ THÊM DANH MỤC MỚI</option>
                    </select>

                    <div id="newCategoryWrapper" class="mb-3 d-none">
                        <label class="form-label small text-primary fw-bold">Tên danh mục mới</label>
                        <input type="text" id="newCategoryInput" class="form-control" placeholder="VD: ChuotGaming">
                    </div>

                    <button class="btn btn-danger w-100" id="btnLoad" onclick="loadCurrentConfig()">Bắt đầu chỉnh sửa</button>
                </div>
            </div>

            <div class="col-md-8">
                <div id="editor-container" class="card shadow-sm p-4 d-none">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 id="editor-title" class="mb-0">Đang thiết lập...</h5>
                        <button class="btn btn-sm btn-success" onclick="addAttribute()">+ Thêm thuộc tính mới</button>
                    </div>
                    <p class="text-muted small mt-2">Mẹo: Các tùy chọn viết cách nhau bởi dấu phẩy (VD: Core i5, Core i7...)</p>
                    <hr>
                    
                    <div id="attribute-list"></div>

                    <div class="mt-4 pt-3 border-top">
                        <button class="btn btn-danger btn-lg w-100 fw-bold" onclick="saveConfig()">
                            LƯU CẤU HÌNH VÀO MONGODB
                        </button>
                    </div>
                </div>

                <div id="empty-state" class="text-center py-5 text-muted bg-white rounded border shadow-sm">
                    <i class="bi bi-gear-wide-connected fs-1"></i>
                    <p class="mt-3">Vui lòng chọn hoặc thêm mới danh mục ở bên trái để bắt đầu cấu hình.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/admin-specs.js"></script>
</body>
</html>
