<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh mục Sản phẩm - KVB</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/category.css"> </head>
<body>

    <div id="header-placeholder"></div>

    <main class="py-4 bg-light">
        <div class="container px-md-5"> 
            <div class="card shadow-sm border-0 p-3 bg-white"> 
                
                <div id="search-header">
                    <div class="d-flex flex-column mb-3">
                        <h2 class="text-center fw-bold">SẢN PHẨM</h2>
                        <p id="search-query-text" class="text-center text-muted">Đang tải...</p>
                    </div>
                
                    <div id="filter-bar" class="d-flex flex-wrap align-items-center gap-2 mb-4 d-none">
                        <div class="fw-bold me-2"><i class="fas fa-filter me-1"></i> Bộ lọc:</div>
                        
                        <div id="dynamic-filters" class="d-flex flex-wrap gap-2 flex-grow-1"></div>

                        <select id="sortSelect" class="form-select form-select-sm w-auto ms-auto border-danger text-danger fw-bold">
                            <option value="">Sắp xếp: Mặc định</option>
                            <option value="asc">Giá: Thấp đến Cao</option>
                            <option value="desc">Giá: Cao xuống Thấp</option>
                        </select>
                    </div>

                    <div id="product-list" class="row row-cols-2 row-cols-md-3 row-cols-xl-5 g-3">
                        </div>
                </div>

                <div id="search-empty" class="text-center py-5" style="display:none;">
                    <div class="my-4">
                        <img src="https://img.icons8.com/puffy-filled/1200/nothing-found.jpg" alt="No results" style="width: 150px; opacity: 0.5;">
                    </div>
                    <p class="text-muted">Rất tiếc, chúng tôi không tìm thấy kết quả phù hợp với bộ lọc của bạn.</p>
                    <a href="category.html" class="btn btn-outline-danger mt-2">Xóa tất cả bộ lọc</a>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/megamenudata.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/category.js"></script> 
</body>
</html>
