<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAO SHOP - Trang Chủ</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
    <div id="header-placeholder"></div>
    
    <div class="container my-4">
        <div class="row position-relative">
            
            <div class="col-md-3">
                <div id="side-menu-container" class="list-group list-group-flush border rounded shadow-sm bg-white py-2 side-menu"></div>
            </div>

            <div class="col-md-9 position-relative" id="megamenu-content-area">
                
                <div id="initial-content" class="h-100 d-flex align-items-center justify-content-center bg-light border rounded">
                    <div class="text-center p-5">
                        <h4>Banner Quảng Cáo Nằm Ở Đây</h4>
                        <p class="text-muted">Sẽ bị bảng Megamenu che đi khi bạn di chuột vào danh mục bên trái</p>
                    </div>
                </div>
                
                <div id="megamenu-content-card" class="megamenu-content-card">
                    <div id="megamenu-panels-container"></div>
                </div>

            </div>
            
        </div>
    </div> 

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/megamenudata.js"></script>
    <script src="js/common.js"></script>
</body>
</html>
