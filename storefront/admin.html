<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Thêm Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Thêm Sản Phẩm Mới</h4>
            </div>
            <div class="card-body">
                <form id="productForm">
                    <div class="mb-3">
                        <label class="form-label">Tên sản phẩm</label>
                        <input type="text" id="title" class="form-control" required placeholder="VD: Chuột Logitech G Pro">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Giá (VNĐ)</label>
                        <input type="number" id="price" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Danh mục</label>
                        <select id="category" class="form-select">
                            <option value="Laptop">Laptop</option>
                            <option value="Desktop">Desktop</option>
                            <option value="CaseNguonTan">Case,Nguồn,Tản</option>
                            <option value="OCungRamTheNho">Ổ Cứng,Ram,Thẻ nhớ</option>
                            <option value="LoaMicroWebCam">Loa,Micro,Webcam</option>
                            <option value="ManHinh">Màn hình</option>
                            <option value="TaiNghe">Tai Nghe</option>
                            <option value="GheBan">Ghế, Bàn</option>
                            <option value="PhanMemMang">Phần mềm, Mạng</option>
                            <option value="PhuKien">Phụ kiện</option>
                            <option value="VGA">VGA</option>
                            <option value="Mouse">Mouse</option>
                            <option value="Keyboard">Keyboard</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Link ảnh (URL)</label>
                        <input type="text" id="image" class="form-control" required placeholder="https://...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mô tả ngắn</label>
                        <textarea id="description" class="form-control" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-danger w-100">Thêm sản phẩm</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // 1. Thu thập dữ liệu từ form
            const productData = {
                title: document.getElementById('title').value,
                price: Number(document.getElementById('price').value),
                description: document.getElementById('description').value,
                category: document.getElementById('category').value,
                image: document.getElementById('image').value,
                // Tạm thời để mặc định cho rating để không bị lỗi layout
                rating: { rate: 5, count: 0 } 
            };

            // 2. Gửi dữ liệu lên Backend qua API
            try {
                const response = await fetch('http://localhost:3000/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(productData)
                });

                if (response.ok) {
                    alert("✅ Thêm thành công! Ra trang category xem thử đi.");
                    document.getElementById('productForm').reset();
                } else {
                    alert("❌ Lỗi rồi: " + (await response.json()).error);
                }
            } catch (error) {
                console.error("Lỗi kết nối:", error);
            }
        });
    </script>
</body>
</html>
